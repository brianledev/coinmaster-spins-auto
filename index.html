<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Master Free Spins – Daily Links by Lê Bình An</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 30px 20px 10px;
    }

    header h1 {
      font-size: 2rem;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    header p {
      color: #ccc;
      margin-top: 8px;
      font-size: 0.95rem;
    }

    #updated {
      display: inline-block;
      background: rgba(255,215,0,0.15);
      border: 1px solid #ffd700;
      color: #ffd700;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8rem;
      margin-top: 10px;
    }

    #btn-refresh {
      display: block;
      margin: 20px auto;
      background: #ffd700;
      color: #1a1a2e;
      border: none;
      border-radius: 25px;
      padding: 10px 28px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #btn-refresh:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 20px rgba(255,215,0,0.4);
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .day-section {
      margin-bottom: 30px;
    }

    .day-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 12px;
      padding: 8px 16px;
      background: rgba(255,215,0,0.1);
      border-left: 4px solid #ffd700;
      border-radius: 4px;
      color: #ffd700;
    }

    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: background 0.2s;
    }

    .link-card:hover {
      background: rgba(255,255,255,0.12);
    }

    .link-card.reward {
      border-color: rgba(255,215,0,0.4);
      background: rgba(255,215,0,0.07);
    }

    .link-info {
      flex: 1;
      min-width: 0;
    }

    .link-label {
      font-size: 0.75rem;
      color: #aaa;
      margin-bottom: 2px;
    }

    .link-url {
      font-size: 0.82rem;
      color: #87ceeb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-card.reward .link-url {
      color: #ffd700;
    }

    .btn-claim {
      flex-shrink: 0;
      background: #ffd700;
      color: #1a1a2e;
      border: none;
      border-radius: 20px;
      padding: 7px 18px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s;
    }

    .btn-claim:hover {
      transform: scale(1.07);
    }

    .btn-claim.secondary {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .empty {
      text-align: center;
      color: #888;
      padding: 20px;
      font-style: italic;
    }

    #loading {
      text-align: center;
      padding: 60px;
      font-size: 1.2rem;
      color: #ffd700;
    }

    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,215,0,0.3);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    footer {
      text-align: center;
      color: #777;
      font-size: 0.8rem;
      margin-top: 40px;
      padding-bottom: 30px;
    }

    .footer-author {
      margin-bottom: 10px;
      font-size: 0.9rem;
      color: #aaa;
    }

    .footer-author strong {
      color: #ffd700;
    }

    .btn-facebook {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1877f2;
      color: #fff;
      border: none;
      border-radius: 25px;
      padding: 9px 22px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.2s;
      margin-bottom: 12px;
    }

    .btn-facebook:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 16px rgba(24,119,242,0.4);
    }

    .btn-claim.claimed {
      background: rgba(255,255,255,0.1);
      color: #aaa;
      border: 1px solid rgba(255,255,255,0.2);
      cursor: default;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎰 Coin Master Free Spins</h1>
      <p>Daily reward links – auto updated every day</p>
      <div id="updated"></div>
    </header>

    <button id="btn-refresh" onclick="loadLinks()">🔄 Refresh</button>

    <div id="loading"><span class="spinner"></span> Loading links...</div>
    <div id="content" style="display:none;"></div>

    <footer>
      <div class="footer-author">Made with ❤️ by <strong>Lê Bình An</strong></div>
      <a class="btn-facebook" href="https://www.facebook.com/BrianLe.Scorp" target="_blank" rel="noopener">
        <svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
        Facebook
      </a>
      <div>Auto updated daily via GitHub Actions</div>
    </footer>
  </div>

  <script>
    const CLAIMED_KEY = 'cm_claimed_urls';

    function getClaimed() {
      return JSON.parse(localStorage.getItem(CLAIMED_KEY) || '[]');
    }

    function markClaimed(url) {
      const claimed = getClaimed();
      if (!claimed.includes(url)) {
        claimed.push(url);
        localStorage.setItem(CLAIMED_KEY, JSON.stringify(claimed));
      }
    }

    function isClaimed(url) {
      return getClaimed().includes(url);
    }

    async function loadLinks() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('content').style.display = 'none';

      try {
        const res = await fetch('spins_today.json?t=' + Date.now());
        const data = await res.json();

        document.getElementById('updated').textContent = '🕐 Updated: ' + data.updated;

        const content = document.getElementById('content');
        content.innerHTML = '';

        for (const [day, links] of Object.entries(data.days)) {
          // Chỉ lấy reward links
          const rewardLinks = (links || []).filter(item =>
            item.url.includes('rewards.coinmaster.com') ||
            item.url.includes('coinmaster.onelink.me')
          );

          if (rewardLinks.length === 0) continue;

          const section = document.createElement('div');
          section.className = 'day-section';

          const title = document.createElement('div');
          title.className = 'day-title';
          title.textContent = '📅 ' + day;
          section.appendChild(title);

          const grid = document.createElement('div');
          grid.className = 'links-grid';

          rewardLinks.forEach((item, idx) => {
            const claimed = isClaimed(item.url);
            const card = document.createElement('div');
            card.className = 'link-card reward';

            card.innerHTML = `
              <div class="link-info">
                <div class="link-label">⭐ Free Spins #${idx + 1}</div>
                <div class="link-url">${item.url}</div>
              </div>
              <a
                class="btn-claim ${claimed ? 'claimed' : ''}"
                href="${claimed ? '#' : item.url}"
                target="${claimed ? '' : '_blank'}"
                rel="noopener"
                data-url="${item.url}"
                onclick="handleClaim(event, this)"
              >
                ${claimed ? '✓ Claimed' : 'Claim →'}
              </a>
            `;
            grid.appendChild(card);
          });

          section.appendChild(grid);
          content.appendChild(section);
        }

        if (content.innerHTML === '') {
          content.innerHTML = '<div class="empty" style="text-align:center;padding:40px;color:#888;">No reward links found today. Check back later!</div>';
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (e) {
        document.getElementById('loading').innerHTML = '❌ Failed to load links. Please refresh.';
        console.error(e);
      }
    }

    function handleClaim(event, btn) {
      const url = btn.getAttribute('data-url');
      if (btn.classList.contains('claimed')) {
        event.preventDefault();
        return;
      }
      // Mở link trước, rồi mark claimed
      window.open(url, '_blank', 'noopener');
      event.preventDefault();
      markClaimed(url);
      btn.textContent = '✓ Claimed';
      btn.classList.add('claimed');
      btn.href = '#';
    }

    loadLinks();
  </script>
</body>
</html>
